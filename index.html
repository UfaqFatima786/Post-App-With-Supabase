<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="SignupPage" class="login-container">
  <div class="login-box">
    <h2 class="text-center mb-3">Sign-Up</h2>

    <input type="text" id="user" class="form-control mb-2" placeholder="Enter Email">
    <input type="password" id="passwordd" class="form-control mb-3" placeholder="Enter Password">

    <button onclick="SignUp()" class="btn btn-primary w-100">Sign Up</button>
  </div>
</div>

<div id="loginPage" class="login-container">
  <div class="login-box">
    <h2 class="text-center mb-3">Login</h2>

    <input type="text" id="username" class="form-control mb-2" placeholder="Enter Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password">

    <button onclick="login()" class="btn btn-primary w-100">Login</button>
  </div>
</div>

<!-- POST APP -->
<div id="appPage" style="display:none;">

  <nav class="navbar my-4">
    <div class="container-fluid">
      <butoon class="btn mb-0 d-block mx-auto">Post App</button>
    </div>
  </nav>

  <div class="container">
    <div class="row">

      <!-- FORM -->
      <div class="col-md-4">
        <div class="card p-3 m-2 shadow">
          <input type="text" class="form-control mb-3" id="title" placeholder="Title">
          <textarea class="form-control mb-3" id="description" placeholder="Description"></textarea>

          <div class="d-flex justify-content-around images">
            <img class="bgImg" onclick="selectImg(this.src)" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSX9R9qeanfxjMODGRgK_Lx9pgzgwgZ7zEmwQ&s">
            <img class="bgImg" onclick="selectImg(this.src)" src="https://t3.ftcdn.net/jpg/03/39/06/02/360_F_339060225_w8ob8LjMJzPdEqD9UFxbE6ibcKx8dFrP.jpg">
            <img class="bgImg" onclick="selectImg(this.src)" src="https://i.pinimg.com/736x/52/29/72/5229728a7b4bebf620e762c9d3bb8edc.jpg">
            <img class="bgImg" onclick="selectImg(this.src)" src="https://static.vecteezy.com/system/resources/previews/014/799/180/non_2x/aesthetic-background-boho-background-background-with-rainbow-moon-leaves-dots-and-geometric-shapes-in-boho-and-aesthetic-style-illustration-vector.jpg">
          </div>

          <button onclick="post()" class="btn btn-primary mt-3">Post</button>
        </div>
      </div>

      <!-- POSTS -->
      <div class="col-md-8 mt-2">
        <div id="posts"></div>
      </div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="app.js"></script>

</body>
</html>
